<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Blank Street Panini — World Cup Leaderboard</title>
  <link rel="stylesheet" href="styles.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
</head>
<body>
  <div class="page">
    <header class="hero">
      <div class="hero-tag">⚽ Blank Street Panini</div>
      <h1>World Cup Leaderboard</h1>
      <p class="hero-sub">Guess the match result, collect sticker packs. One correct guess = one pack of 5 random stickers.</p>
    </header>

    <section class="stats">
      <div class="stat-card">
        <div class="stat-value" id="stat-players">—</div>
        <div class="stat-label">Players</div>
      </div>
      <div class="stat-card">
        <div class="stat-value" id="stat-games">—</div>
        <div class="stat-label">Games played</div>
      </div>
      <div class="stat-card accent">
        <div class="stat-value" id="stat-packs">—</div>
        <div class="stat-label">Packs awarded 🎁</div>
      </div>
      <div class="stat-card">
        <div class="stat-value" id="stat-accuracy">—</div>
        <div class="stat-label">Group accuracy</div>
      </div>
    </section>

    <section class="board">
      <h2>Standings</h2>
      <div class="pickups-bar" id="pickups-bar"></div>
      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th class="col-rank">#</th>
              <th class="col-player">Player</th>
              <th class="col-num">Bet</th>
              <th class="col-num">Correct</th>
              <th class="col-num">Accuracy</th>
              <th class="col-packs">Packs</th>
              <th class="col-collected">Collected</th>
            </tr>
          </thead>
          <tbody id="leaderboard-body"></tbody>
        </table>
      </div>
    </section>

    <footer class="foot">
      <span>Blank Street Panini · 2026 World Cup</span>
    </footer>
  </div>

  <script src="data.js"></script>
  <script src="pickups.js"></script>
  <script src="app.js"></script>
</body>
</html>
